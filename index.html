<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ziv Sobol - Portfolio</title>
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700,900" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', sans-serif;
            line-height: 1.6;
            color: #333;
        }

        /* Header styles */
        header {
            background: #fff;
            padding: 20px 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        #menu {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        #menu a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.3s;
        }

        #menu a:hover {
            color: #2196F3;
        }

        /* Lead section styles */
        #lead {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.9)), url('/api/placeholder/1920/1080');
            background-size: cover;
        }

        #lead-content {
            max-width: 800px;
            padding: 20px;
        }

        #lead-content h1 {
            font-size: 3.5em;
            margin-bottom: 10px;
        }

        #lead-content h2 {
            font-size: 2em;
            color: #555;
            margin-bottom: 20px;
        }

        /* Projects section styles */
        .projects-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            position: relative;
        }

        .project-carousel {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .arrow {
            font-size: 2em;
            cursor: pointer;
            padding: 10px;
            background: none;
            border: none;
            color: #2196F3;
            transition: transform 0.3s;
        }

        .arrow:hover {
            transform: scale(1.2);
        }

        .project-tile {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 20px;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .project-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .project-title {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: #333;
        }

        .project-details {
            color: #666;
            margin-bottom: 15px;
        }

        /* About section styles */
        #about {
            padding: 80px 20px;
            background: #f9f9f9;
        }

        /* Experience section styles */
        #experience {
            padding: 80px 20px;
        }

        /* Skills section styles */
        #skills {
            padding: 80px 20px;
            background: #f9f9f9;
        }

        .skills-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Contact section styles */
        #contact {
            padding: 80px 20px;
            text-align: center;
        }

        #contact form {
            max-width: 600px;
            margin: 0 auto;
        }

        /* Footer styles */
        footer {
            background: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        .social-links {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .social-links a {
            color: #fff;
            font-size: 1.5em;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: #2196F3;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <nav>
            <ul id="menu">
                <li><a href="#about">About</a></li>
                <li><a href="#experience">Experience</a></li>
                <li><a href="#education">Education</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#skills">Skills</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Lead section -->
    <section id="lead">
        <div id="lead-content">
            <h1>Ziv Sobol</h1>
            <h2>Data Scientist & ML Researcher</h2>
            <h3><b>Embraces challenges and loves people</b></h3>
        </div>
    </section>

    <!-- Projects section -->
    <section id="projects">
        <div class="projects-container">
            <div class="project-carousel">
                <button class="arrow left-arrow" onclick="prevProject()">←</button>
                <div class="project-tile" id="current-project">
                    <img src="/api/placeholder/800/400" alt="Project Image" class="project-image">
                    <div class="project-title">Loading...</div>
                    <div class="project-details">
                        <p>Loading project details...</p>
                    </div>
                </div>
                <button class="arrow right-arrow" onclick="nextProject()">→</button>
            </div>
        </div>
    </section>

    <!-- Add remaining sections -->
    <section id="about">
        <!-- About content -->
    </section>

    <section id="experience">
        <!-- Experience content -->
    </section>

    <section id="skills">
        <!-- Skills content -->
    </section>

    <section id="contact">
        <!-- Contact form -->
    </section>

    <footer>
        <div class="social-links">
            <a href="https://github.com/Ziv2" target="_blank"><i class="fa fa-github"></i></a>
            <a href="https://www.linkedin.com/in/ziv-sobol/" target="_blank"><i class="fa fa-linkedin"></i></a>
        </div>
        <p>&copy; 2024 Ziv Sobol</p>
    </footer>

    <script>
        // Project carousel functionality
        const projects = [
            {
                title: 'CHATBOT',
                image: '/api/placeholder/800/400',
                description: 'Configurable bilingual chatbot based on the ConveRT enhanced question-response Transformer architecture.',
                link: 'https://github.com/primrose-deep-learning-schoo/myRobot'
            },
            {
                title: 'NLP Augmentation',
                image: '/api/placeholder/800/400',
                description: 'Synthetic sentences that preserve meaning, to augment chatbot training.',
                link: 'https://github.com/Ziv2/NLP-Augmentation'
            },
            // Add more projects here
        ];

        let currentProjectIndex = 0;

        function updateProject() {
            const projectTile = document.getElementById('current-project');
            const project = projects[currentProjectIndex];
            
            projectTile.querySelector('.project-image').src = project.image;
            projectTile.querySelector('.project-title').textContent = project.title;
            projectTile.querySelector('.project-details').innerHTML = `
                <p>${project.description}</p>
                <a href="${project.link}" target="_blank">View Project</a>
            `;
        }

        function nextProject() {
            currentProjectIndex = (currentProjectIndex + 1) % projects.length;
            updateProject();
        }

        function prevProject() {
            currentProjectIndex = (currentProjectIndex - 1 + projects.length) % projects.length;
            updateProject();
        }

        // Initialize first project
        document.addEventListener('DOMContentLoaded', updateProject);

        // Smooth scrolling for navigation
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>
</html>
